# ============================================================
# Configuración de Netlify para Lúmenes
# ============================================================

[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirección SPA: cualquier ruta cae en index.html para que el router
# del cliente la maneje (esta app no tiene rutas, pero lo dejamos por buena práctica).
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Cache largo para assets versionados (Vite añade hash al filename)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache moderado para los mp3 de la playlist
[[headers]]
  for = "/music/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Headers de seguridad básicos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
